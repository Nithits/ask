version: '3.8'

services:
  webserver:
    build: 
      context: ./php
    container_name: ask_webserver
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - database

  database:
    image: mysql:8.0
    container_name: ask_database
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ask_cal_db
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpassword
    ports:
      - "3306:3306"
    volumes:
      - ./db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ask_phpmyadmin
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8081:80"
    depends_on:
      - database